name: BCH Corporate Code Compliance Audit

on:
  push:
    branches: [ main, dev, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  code-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code Assets
      uses: actions/checkout@v4

    - name: Initialize Workstation Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Syntax & Compile Verification
      run: |
        python -m py_compile main.py
